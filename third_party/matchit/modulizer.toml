[module]
name = "matchit"

[headers]
include_dirs = [
    "D://dev//prism//build//debug-static//vcpkg_installed//x64-windows//include"
]
library_headers = [
    "matchit.h",
]
header_guard_format = "MATCHIT_(\\w+_)?H"

[macros]
expand_from_definition = [
]
explicit_macros = [
    "XXH_PUBLIC_API",
    "XXH_CONSTF",
    "XXH_PUREF",
    "XXH_MALLOCF",
    "XXH_FALLTHROUGH=[[fallthrough]]",
    "XXH_NOESCAPE"
]

[symbols]
exclude = [
    "matchit::impl",
    "std"
]
